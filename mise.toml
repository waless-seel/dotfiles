[tools]
fzf      = "latest"
fd       = "latest"
bat      = "latest"
rg       = "latest"
eza      = "latest"
zoxide   = "latest"
starship = "latest"
delta    = "latest"
lazygit  = "latest"
node     = "lts"
python   = "latest"
claude   = "latest"

[tasks.install]
description = "全ツールをインストール"
run = ["mise install", "mise run npm-globals"]

[tasks.npm-globals]
description = "グローバル npm パッケージをインストール (.default-npm-packages)"
run = "bash scripts/npm-globals.sh"

[tasks.update]
description = "全ツールを最新版に更新"
run = "mise upgrade"

[tasks.doctor]
description = "インストール状態を診断"
run = ["mise doctor", "mise ls"]
